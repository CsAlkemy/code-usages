# Push a tag like v0.4.0 → builds Apple Silicon + Intel DMGs with Tauri and
# publishes a GitHub Release with generated notes.
#
# Works with NO secrets configured — you get unsigned builds (users
# right-click → Open once). To ship signed + notarized builds, add these
# repository secrets (Tauri picks them up automatically):
#
#   APPLE_CERTIFICATE              base64 of the Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD     password for that .p12
#   APPLE_SIGNING_IDENTITY         e.g. "Developer ID Application: Name (TEAMID)"
#   APPLE_ID                       Apple ID email (notarization)
#   APPLE_PASSWORD                 app-specific password for that Apple ID
#   APPLE_TEAM_ID                  10-char team id
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (Apple Silicon)
        run: npx tauri build --target aarch64-apple-darwin
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build (Intel)
        run: npx tauri build --target x86_64-apple-darwin
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Publish release
        run: |
          v="${GITHUB_REF_NAME#v}"
          mkdir -p out
          cp "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Code Usages_${v}_aarch64.dmg" "out/code-usages-${v}-arm64.dmg"
          cp "src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/Code Usages_${v}_x64.dmg" "out/code-usages-${v}-x64.dmg"
          gh release create "$GITHUB_REF_NAME" out/*.dmg --generate-notes --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
