# Push a tag like v0.4.0 → builds Apple Silicon + Intel DMGs with Tauri and
# publishes a GitHub Release with generated notes.
#
# Works with NO secrets configured — you get unsigned builds (users
# right-click → Open once). To ship signed + notarized builds, add these
# repository secrets (Tauri picks them up automatically):
#
#   APPLE_CERTIFICATE              base64 of the Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD     password for that .p12
#   APPLE_SIGNING_IDENTITY         e.g. "Developer ID Application: Name (TEAMID)"
#   APPLE_ID                       Apple ID email (notarization)
#   APPLE_PASSWORD                 app-specific password for that Apple ID
#   APPLE_TEAM_ID                  10-char team id
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  issues: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Tauri treats a PRESENT-but-empty APPLE_CERTIFICATE as "please sign"
      # and then chokes importing an empty cert. Only export the signing env
      # when the secrets actually have content.
      - name: Export signing env (only if secrets are set)
        shell: bash
        env:
          _CERT: ${{ secrets.APPLE_CERTIFICATE }}
          _CERT_PW: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          _IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          _ID: ${{ secrets.APPLE_ID }}
          _PW: ${{ secrets.APPLE_PASSWORD }}
          _TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$_CERT" ]; then
            {
              echo "APPLE_CERTIFICATE=$_CERT"
              echo "APPLE_CERTIFICATE_PASSWORD=$_CERT_PW"
              echo "APPLE_SIGNING_IDENTITY=$_IDENTITY"
              echo "APPLE_ID=$_ID"
              echo "APPLE_PASSWORD=$_PW"
              echo "APPLE_TEAM_ID=$_TEAM"
            } >> "$GITHUB_ENV"
            echo "Signing enabled."
          else
            echo "No signing secrets — building unsigned."
          fi

      # Build .app bundles only; the DMGs are made with hdiutil below —
      # Tauri's bundle_dmg.sh drives Finder via AppleScript, which is flaky
      # on headless CI runners.
      - name: Build (Apple Silicon)
        shell: bash # explicit shell → pipefail, so tee can't mask a failure
        run: npx tauri build --target aarch64-apple-darwin --bundles app --verbose 2>&1 | tee -a build.log

      - name: Build (Intel)
        shell: bash
        run: npx tauri build --target x86_64-apple-darwin --bundles app --verbose 2>&1 | tee -a build.log

      - name: Package DMGs
        run: |
          v="${GITHUB_REF_NAME#v}"
          mkdir -p out
          for pair in "aarch64-apple-darwin arm64" "x86_64-apple-darwin x64"; do
            set -- $pair
            staging="staging-$2"
            mkdir -p "$staging"
            cp -R "src-tauri/target/$1/release/bundle/macos/Code Usages.app" "$staging/"
            ln -s /Applications "$staging/Applications"
            hdiutil create -volname "Code Usages" -srcfolder "$staging" -ov -format UDZO "out/code-usages-${v}-$2.dmg"
          done
          ls -la out/

      - name: Publish release
        run: gh release create "$GITHUB_REF_NAME" out/*.dmg --generate-notes --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Failure logs aren't readable via the unauthenticated API, but issues
      # are — file the build log tail as an issue so failures self-report.
      - name: Report failure as issue
        if: failure()
        run: |
          {
            echo "Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo '```'
            tail -c 60000 build.log 2>/dev/null || echo "(no build.log)"
            echo '```'
          } > issue-body.md
          gh issue create --title "CI failure: $GITHUB_REF_NAME (run $GITHUB_RUN_ID)" --body-file issue-body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
