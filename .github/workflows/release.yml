# Push a tag like v0.4.0 → builds Apple Silicon + Intel DMGs with Tauri and
# publishes a GitHub Release with generated notes.
#
# Works with NO secrets configured — you get unsigned builds (users
# right-click → Open once). To ship signed + notarized builds, add these
# repository secrets (Tauri picks them up automatically):
#
#   APPLE_CERTIFICATE              base64 of the Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD     password for that .p12
#   APPLE_SIGNING_IDENTITY         e.g. "Developer ID Application: Name (TEAMID)"
#   APPLE_ID                       Apple ID email (notarization)
#   APPLE_PASSWORD                 app-specific password for that Apple ID
#   APPLE_TEAM_ID                  10-char team id
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Build .app bundles only; the DMGs are made with hdiutil below —
      # Tauri's bundle_dmg.sh drives Finder via AppleScript, which is flaky
      # on headless CI runners.
      - name: Build (Apple Silicon)
        run: npx tauri build --target aarch64-apple-darwin --bundles app --verbose
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build (Intel)
        run: npx tauri build --target x86_64-apple-darwin --bundles app --verbose
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Package DMGs
        run: |
          v="${GITHUB_REF_NAME#v}"
          mkdir -p out
          for pair in "aarch64-apple-darwin arm64" "x86_64-apple-darwin x64"; do
            set -- $pair
            staging="staging-$2"
            mkdir -p "$staging"
            cp -R "src-tauri/target/$1/release/bundle/macos/Code Usages.app" "$staging/"
            ln -s /Applications "$staging/Applications"
            hdiutil create -volname "Code Usages" -srcfolder "$staging" -ov -format UDZO "out/code-usages-${v}-$2.dmg"
          done
          ls -la out/

      - name: Publish release
        run: gh release create "$GITHUB_REF_NAME" out/*.dmg --generate-notes --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
