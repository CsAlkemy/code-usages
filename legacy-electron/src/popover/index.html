<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popover.css">
</head>
<body>
  <div class="card" id="card">

    <!-- ===================== MAIN VIEW ===================== -->
    <section class="view" id="mainView">
      <header class="hdr">
        <span class="title">Claude usage</span>
        <div class="hdr-actions">
          <span class="plan" id="plan" hidden></span>
          <button class="iconbtn" id="openSettings" title="Settings" aria-label="Settings">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
      </header>

      <div class="hero">
        <div class="ringwrap">
          <canvas id="ring" width="104" height="104"></canvas>
          <div class="ringlabel"><span id="ringpct"></span></div>
        </div>
        <div class="herotext">
          <div class="herolabel" id="herolabel">Current session</div>
          <div class="heroname" id="heroname">No data yet</div>
        </div>
      </div>

      <div class="rows" id="rows"></div>

      <footer class="ftr">
        <button class="btn" id="refresh" title="Refresh now">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3v6h-6"/></svg>
          <span>Refresh</span>
        </button>
        <span class="updated" id="updated"></span>
        <button id="signin" class="link">Open Claude</button>
      </footer>
    </section>

    <!-- ===================== SETTINGS VIEW ===================== -->
    <section class="view" id="settingsView" hidden>
      <header class="hdr">
        <button class="iconbtn" id="backSettings" title="Back" aria-label="Back">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <span class="title">Settings</span>
        <span class="hdr-spacer"></span>
      </header>

      <div class="settings">
        <div class="setrow">
          <div class="settext">
            <div class="setname">Show percentage</div>
            <div class="setdesc">Number beside the menu-bar ring</div>
          </div>
          <button class="switch" id="toggleNumber" role="switch" aria-checked="false"><span class="knob"></span></button>
        </div>

        <div class="setrow col">
          <div class="settext">
            <div class="setname">Appearance</div>
          </div>
          <div class="segmented" id="themeSeg" role="radiogroup" aria-label="Appearance">
            <button class="seg" data-val="system" role="radio" aria-checked="false">System</button>
            <button class="seg" data-val="light" role="radio" aria-checked="false">Light</button>
            <button class="seg" data-val="dark" role="radio" aria-checked="false">Dark</button>
          </div>
        </div>

        <div class="setrow">
          <div class="settext">
            <div class="setname">Open at login</div>
            <div class="setdesc">Start automatically on sign-in</div>
          </div>
          <button class="switch" id="toggleLogin" role="switch" aria-checked="false"><span class="knob"></span></button>
        </div>
      </div>

      <footer class="ftr ftr-settings">
        <span class="brand">code-usages</span>
        <span class="ver">v0.3.0</span>
      </footer>
    </section>

  </div>
  <script src="popover.js"></script>
</body>
</html>
