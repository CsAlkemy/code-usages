<!doctype html>
<html>
<head><meta charset="utf-8"></head>
<body>
<canvas id="c"></canvas>
<script>
  // Draws a progress ring and returns a PNG data URL. Called from the main
  // process via executeJavaScript. Rendered at 2x for crispness on the tray.
  window.drawRing = function (pct, sizePx, color, track) {
    var scale = 2;
    var S = Math.round(sizePx * scale);
    var cv = document.getElementById('c');
    cv.width = S; cv.height = S;
    var ctx = cv.getContext('2d');
    ctx.clearRect(0, 0, S, S);

    // Padding keeps the ring smaller than its image box, so once macOS scales
    // the icon to the menu-bar height it sits at the same visual weight as the
    // system icons beside it (which have their own internal padding).
    var pad = Math.round(S * 0.16);
    var lw = Math.max(1.5 * scale, Math.round(S * 0.12));
    var r = (S - lw) / 2 - pad;
    var cx = S / 2, cy = S / 2;

    // track
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = track || 'rgba(150,150,150,0.35)';
    ctx.lineWidth = lw;
    ctx.stroke();

    // progress
    var p = Math.max(0, Math.min(100, pct || 0)) / 100;
    if (p > 0) {
      ctx.beginPath();
      ctx.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + p * Math.PI * 2);
      ctx.strokeStyle = color || '#33C89A';
      ctx.lineWidth = lw;
      ctx.lineCap = 'round';
      ctx.stroke();
    }
    return cv.toDataURL('image/png');
  };
</script>
</body>
</html>
